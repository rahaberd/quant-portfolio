<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live News Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #f8faf8;
        --bg-grad-a: #e5f5ee;
        --bg-grad-b: #dff0f8;
        --brand-ink: #0f172a;
        --brand-accent: #0f766e;
        --brand-highlight: #f59e0b;
      }

      body {
        font-family: "IBM Plex Sans", sans-serif;
        background:
          radial-gradient(circle at 10% 10%, var(--bg-grad-a) 0%, transparent 35%),
          radial-gradient(circle at 85% 0%, var(--bg-grad-b) 0%, transparent 40%),
          var(--bg-deep);
        color: var(--brand-ink);
      }

      h1,
      h2,
      h3,
      .headline-font {
        font-family: "Space Grotesk", sans-serif;
      }

      .card-enter {
        animation: card-enter 500ms ease both;
      }

      .summary-clamp {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      @keyframes card-enter {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body class="min-h-screen">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <header class="mb-8 rounded-3xl border border-emerald-100 bg-white/70 p-6 shadow-sm backdrop-blur">
        <div class="flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="headline-font text-sm uppercase tracking-[0.2em] text-emerald-700">Realtime Desk</p>
            <h1 class="mt-2 text-3xl font-bold sm:text-4xl">Live News Aggregator</h1>
            <p class="mt-3 max-w-2xl text-slate-600">
              A streaming dashboard combining RSS and API headlines with automatic refresh every 15 minutes.
            </p>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <label class="text-sm font-medium text-slate-600" for="sourceFilter">Source</label>
            <select
              id="sourceFilter"
              class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 shadow-sm outline-none ring-emerald-200 transition focus:ring"
            >
              <option value="">All sources</option>
            </select>
            <span id="wsStatus" class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-800">Connecting...</span>
          </div>
        </div>
      </header>

      <main>
        <div id="articlesGrid" class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3"></div>
        <p id="emptyState" class="hidden rounded-2xl border border-dashed border-slate-300 bg-white/70 p-10 text-center text-slate-600">
          No news found for this filter yet.
        </p>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
